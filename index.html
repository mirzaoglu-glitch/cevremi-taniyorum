<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Akıllı Tanıma</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #d9f7e8, #b8e7d3);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* ÜST ŞERİT */
.ust-serit {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: linear-gradient(135deg, #15803d, #22c55e);
  color: white;
  text-align: center;
  padding: 18px 0;
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  z-index: 10;
}

.okul-adi {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 1px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.proje-adi {
  font-size: 16px;
  font-weight: 500;
  opacity: 0.95;
}

/* ANA KUTU */
.container {
  margin-top: 130px;
  background: white;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
  font-size: 32px;
  color: #0f766e;
  margin: 10px 0;
}

button {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  border: none;
  padding: 14px 22px;
  border-radius: 14px;
  font-size: 18px;
  cursor: pointer;
  margin-top: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

#durum {
  margin-top: 10px;
  font-weight: bold;
  color: blue;
}

canvas {
  border-radius: 15px;
  margin-top: 10px;
}

#sonuc {
  margin-top: 15px;
  font-size: 22px;
  font-weight: bold;
}

#oran {
  margin-top: 5px;
}

#bilgi {
  margin-top: 10px;
  color: #065f46;
}

#kutu {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  background: #eef;
  font-weight: bold;
}

.alt-mesaj {
  margin-top: 15px;
  font-size: 13px;
  color: #6b7280;
}
</style>
</head>

<body>

<div class="ust-serit">
  <div class="okul-adi">🏫 Cemal Sala Ortaokulu</div>
  <div class="proje-adi">TÜBİTAK 4006-A Projesi</div>
</div>

<div class="container">
  <h2>♻️ Akıllı Tanıma</h2>
  <p>Atığı kameraya göster, yapay zeka tanısın.</p>

  <button onclick="init()">Kamerayı Başlat</button>

  <div id="durum">Hazır.</div>

  <div id="webcam-container"></div>

  <div id="sonuc">Sonuç burada görünecek</div>
  <div id="oran"></div>
  <div id="bilgi"></div>
  <div id="kutu"></div>

  <div class="alt-mesaj">
    Çevreyi korumak küçük adımlarla başlar 🌿
  </div>
</div>

<script>
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/rF3fRG3yP/";

let model, webcam;

// Ses kontrolü
let sonKonusulanSinif = "";
let nesneAktif = false;

async function init() {
  try {
    document.getElementById("durum").innerText = "Model yükleniyor...";

    const modelURL = MODEL_URL + "model.json";
    const metadataURL = MODEL_URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);

    document.getElementById("durum").innerText = "Kamera açılıyor...";

    webcam = new tmImage.Webcam(250, 250, true);
    await webcam.setup();
    await webcam.play();
    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").innerHTML = "";
    document.getElementById("webcam-container").appendChild(webcam.canvas);

    document.getElementById("durum").innerText = "Çalışıyor.";
  } catch (e) {
    document.getElementById("durum").innerText = "Hata: " + e.message;
  }
}

async function loop() {
  webcam.update();
  await predict();
  window.requestAnimationFrame(loop);
}

function bilgiGetir(ad) {
  ad = ad.toLowerCase();

  if (ad === "plastik") {
    return {
      mesaj: "♻️ Plastik tespit edildi",
      bilgi: "Plastik atıklar geri dönüştürülerek doğaya zarar vermesi engellenebilir.",
      kutu: "🟡 Sarı geri dönüşüm kutusu",
      ses: "Plastik tespit edildi. Sarı geri dönüşüm kutusuna atınız."
    };
  }

  if (ad === "cam") {
    return {
      mesaj: "🧊 Cam tespit edildi",
      bilgi: "Cam yüzde yüz geri dönüştürülebilir ve tekrar kullanılabilir.",
      kutu: "🟢 Yeşil geri dönüşüm kutusu",
      ses: "Cam tespit edildi. Yeşil geri dönüşüm kutusuna atınız."
    };
  }

  if (ad === "kağıt" || ad === "kagit") {
    return {
      mesaj: "📄 Kağıt tespit edildi",
      bilgi: "Kağıt geri dönüşümü ağaçların kesilmesini azaltır.",
      kutu: "🔵 Mavi geri dönüşüm kutusu",
      ses: "Kağıt tespit edildi. Mavi geri dönüşüm kutusuna atınız."
    };
  }

  if (ad === "metal") {
    return {
      mesaj: "🔩 Metal tespit edildi",
      bilgi: "Metal atıklar tekrar kullanılarak enerji tasarrufu sağlanabilir.",
      kutu: "⚪ Gri geri dönüşüm kutusu",
      ses: "Metal tespit edildi. Gri geri dönüşüm kutusuna atınız."
    };
  }
if(ad=== "tanimsiz") {
  return {
    mesaj:"İnsan algılandı ☺️",
    bilgi:"Bu bir atık değildir.",
    kutu:"🛑 Geri dönüşüm gerektirmez",
      ses:"insan algılandı. Bu bir atıkk değildir."
  };
  }
  return {
    mesaj: "❗ Nesne algılanamadı",
    bilgi: "Lütfen nesneyi kameraya daha net gösteriniz.",
    kutu: "🚫 Atık türü belirlenemedi",
    ses: "Nesne algılanamadı. Lütfen nesneyi kameraya daha net gösteriniz."
  };
}

function konus(metin) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(metin);
  u.lang = "tr-TR";
  speechSynthesis.speak(u);
}

async function predict() {
  const tahmin = await model.predict(webcam.canvas);

  let enYuksek = tahmin[0];
  for (let i = 1; i < tahmin.length; i++) {
    if (tahmin[i].probability > enYuksek.probability) {
      enYuksek = tahmin[i];
    }
  }

  const yuzde = Math.round(enYuksek.probability * 100);

  
  if (yuzde < 85) {

  document.getElementById("sonuc").innerText = "❗ Nesne algılanamadı";
  document.getElementById("oran").innerText = "Güven düşük";
  document.getElementById("bilgi").innerText = "Lütfen nesneyi kameraya daha net gösteriniz.";
  document.getElementById("kutu").innerText = "🚫 Atık türü belirlenemedi";

  
  if (nesneAktif === true) {
    konus("Nesne algılanamadı");
  }

  // Durumu sıfırla
  nesneAktif = false;
  sonKonusulanSinif = "";

  return;
}

  const bilgi = bilgiGetir(enYuksek.className);

  document.getElementById("sonuc").innerText = bilgi.mesaj;
  document.getElementById("oran").innerText = "Güven: %" + yuzde;
  document.getElementById("bilgi").innerText = bilgi.bilgi;
  document.getElementById("kutu").innerText = bilgi.kutu;

  // Aynı nesne sabit dururken tekrar konuşmasın
  if (!nesneAktif || sonKonusulanSinif !== enYuksek.className) {
    konus(bilgi.ses);
    nesneAktif = true;
    sonKonusulanSinif = enYuksek.className;
  }
}
</script>

</body>
</html>
