<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akıllı Tanıma</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #d4fcf7, #96e6a1);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Kart tasarım */
.container {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
    width: 300px;
}

/* Başlık */
h2 {
    color: #2c7a7b;
}

/* Buton */
button {
    background: #38a169;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #2f855a;
}

/* Sonuç yazısı */
#sonuc {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}

#webcam-container {
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
    <h2>♻️ Akıllı Tanıma</h2>
    <button onclick="init()">Kamerayı Başlat</button>

    <div id="durum">Hazır.</div>
    <div id="webcam-container"></div>
    <div id="sonuc"></div>
</div>

<script>

const URL = "https://teachablemachine.withgoogle.com/models/Hi8uzjLs4/";

let model, webcam, maxPredictions;

async function init() {
    document.getElementById("durum").innerText = "Model yükleniyor...";

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    document.getElementById("durum").innerText = "Kamera açılıyor...";

    webcam = new tmImage.Webcam(250, 250, true);
    await webcam.setup();
    await webcam.play();

    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").appendChild(webcam.canvas);

    document.getElementById("durum").innerText = "Çalışıyor...";
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    const prediction = await model.predict(webcam.canvas);

    let enYuksek = prediction[0];

    for (let i = 1; i < prediction.length; i++) {
        if (prediction[i].probability > enYuksek.probability) {
            enYuksek = prediction[i];
        }
    }

    let sonucText = "";
    let renk = "";

    // SINIFLARA GÖRE RENK VE METİN
    if (enYuksek.className == "plastik") {
        sonucText = "♻️ Plastik tespit edildi!";
        renk = "green";
    } 
    else if (enYuksek.className == "cam") {
        sonucText = "🧊 Cam tespit edildi!";
        renk = "blue";
    } 
    else if (enYuksek.className == "kağıt") {
        sonucText = "📄 Kağıt tespit edildi!";
        renk = "orange";
    } 
    else {
        sonucText = "❓ Tanımlanamadı";
        renk = "gray";
    }

    document.getElementById("sonuc").innerHTML =
        `<span style="color:${renk}">${sonucText} (%${(enYuksek.probability * 100).toFixed(0)})</span>`;
}

</script>

</body>
</html>
